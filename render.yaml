services:
  - type: web
    name: giltee-ledger-web
    env: node
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: giltee-ledger-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SS_ACCOUNT_NUMBER
        sync: false
      - key: SS_API_KEY
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: GMAIL_TARGET_ACCOUNT
        value: custom@giltee.com
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: APP_URL
        sync: false

databases:
  - name: giltee-ledger-db
    databaseName: giltee_ledger
    user: giltee
